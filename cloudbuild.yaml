# cloudbuild.yaml
options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', '-t', 'us-central1-docker.pkg.dev/gen-lang-client-0056483717/gemini-repo/gemini-adk-agent:$SHORT_SHA', '.'
    ]

  # Push Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 'us-central1-docker.pkg.dev/gen-lang-client-0056483717/gemini-repo/gemini-adk-agent:$SHORT_SHA'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'gemini-adk-agent',
      '--image', 'us-central1-docker.pkg.dev/gen-lang-client-0056483717/gemini-repo/gemini-adk-agent:$SHORT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

images:
  - 'us-central1-docker.pkg.dev/gen-lang-client-0056483717/gemini-repo/gemini-adk-agent:$SHORT_SHA'
